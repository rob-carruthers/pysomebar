bar_type = "dwlb"
modules = ["mpd", "memory", "pulse", "temp", "pacman", "date"]
base_color = "white0"
separator = " | "
separator_color = "white0"
edge_padding = 1

[colors]
green_d = "#97b67c"
yellow_d = "#e7c173"
red_d = "#b74e58"
white0 = "#bbc3d4"
gray5 = "#60728a"
magenta = "#b48ead"

[memory]
interval = 10

[network]
interval = 2
device = "enp6s0"

[battery]
interval = 10
green_threshold = 30
yellow_threshold = 20

[brightness]
interval = 5
device = "nvidia_wmi_ec_backlight"

[date]
interval = 5
format = "%d/%m/%Y %H:%M"

[pacman]
interval = 3600
available_updates_color = "magenta"

[portage]
interval = 3600
watch_file = "/var/cache/eix/portage.eix"
available_updates_color = "magenta"

[pulse]
interval = 300
mute_color = "gray5"

[mpd]
interval = 10
host = "localhost"
port = 6600

[temp]
interval = 5
device = "k10temp"
